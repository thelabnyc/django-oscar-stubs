- case: get_class_no_mro_cycle_with_forked_app
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings_forked_order
  main: |
    # Verify that get_class resolves to the oscar base when the order app is
    # forked, preventing MRO cycles when a third-party mixin and the forked
    # class both derive from get_class("order.utils", "OrderCreator").
    from oscar.core.loading import get_class
    from tests.forked_order.utils import OrderCreator as ForkedOrderCreator

    # The plugin must resolve this to oscar.apps.order.utils.OrderCreator
    # (not the forked version), to avoid creating an inheritance cycle.
    BaseOrderCreator = get_class("order.utils", "OrderCreator")
    reveal_type(BaseOrderCreator)  # N: Revealed type is "def () -> oscar.apps.order.utils.OrderCreator"

    # Verify the forked class is usable (MRO is valid, no cycle)
    creator = ForkedOrderCreator()
    reveal_type(creator.forked_method())  # N: Revealed type is "builtins.str"
    reveal_type(creator.custom_mixin_method())  # N: Revealed type is "builtins.str"

- case: thirdparty_mixin_method_return_type_remapped_for_forked_app
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings_forked_order
    [mypy.plugins.django-oscar-stubs]
    oscar_third_party_packages = tests.thirdparty_checkout
  main: |
    # When a forked OrderCreator overrides place_order and calls
    # super().place_order(), the return type from the third-party mixin
    # should be remapped to the forked Order type.  Without remapping,
    # super().place_order() would return oscar.apps.order.models.Order
    # while the child declares -> tests.forked_order.models.Order,
    # causing a spurious [return-value] error.
    from tests.forked_order.utils import OrderCreator
    from tests.forked_order.models import Order

    creator = OrderCreator()
    result = creator.place_order(
        basket=None,
        total=None,
        shipping_method=None,
        shipping_charge=None,
    )
    reveal_type(result)  # N: Revealed type is "tests.forked_order.models.Order"

- case: thirdparty_mixin_param_type_remapped_for_forked_app
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings_forked_order
    [mypy.plugins.django-oscar-stubs]
    oscar_third_party_packages = tests.thirdparty_checkout
  main: |
    # When a third-party mixin has an oscar model type as a parameter
    # (not just a return type), the parameter type should also be remapped
    # to the forked equivalent.  Without this, the child override using the
    # forked Order type would trigger an [override] LSP violation.
    from tests.forked_order.utils import OrderCreator
    from tests.forked_order.models import Order

    creator = OrderCreator()
    order = Order()
    result = creator.update_order_status(order, "shipped")
    reveal_type(result)  # N: Revealed type is "tests.forked_order.models.Order"

- case: override_method_with_concrete_param_no_lsp_error
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings
  main: |
    # When a child class overrides a method from an oscar abstract model
    # and uses concrete types instead of abstract types in the signature,
    # the plugin should remap abstract types in the base so that mypy
    # doesn't report an [override] LSP violation.
    from typing import Any
    from django.contrib.auth.models import AnonymousUser, User
    from oscar.apps.voucher.abstract_models import AbstractVoucher
    from oscar.apps.basket.models import Basket
    from oscar.apps.order.models import Order

    class MyVoucher(AbstractVoucher):
        def is_available_for_basket(self, basket: Basket) -> tuple[bool, str]:
            return (True, "")

        def record_usage(self, order: Order, user: User | AnonymousUser | None, *args: Any, **kwargs: Any) -> None:
            pass

- case: override_non_model_class_with_concrete_param_no_lsp_error
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings
  main: |
    # Non-model classes loaded via get_class() should also have abstract
    # types remapped in their method signatures, so that overrides using
    # concrete types don't trigger LSP violations.
    from django.http import HttpRequest
    from oscar.apps.basket.middleware import BasketMiddleware
    from oscar.apps.basket.models import Basket

    class MyBasketMiddleware(BasketMiddleware):
        def get_basket(self, request: HttpRequest) -> Basket:
            return Basket()
        def apply_offers_to_basket(self, request: HttpRequest, basket: Basket) -> None:
            pass
