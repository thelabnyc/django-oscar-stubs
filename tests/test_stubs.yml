- case: get_model_resolves_order
  mypy_config: |
    [mypy]
    plugins =
        mypy_django_plugin.main,
        mypy_oscar_plugin
    [mypy.plugins.django-stubs]
    django_settings_module = tests.mypy_test_settings
  main: |
    from oscar.core.loading import get_model
    Order = get_model('order', 'Order')
    reveal_type(Order)  # N: Revealed type is "type[oscar.apps.order.models.Order]"

